<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boast in God</title>

    <!-- 구글 웹폰트 연동 -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Noto+Sans+KR:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Jua&family=Gamja+Flower&family=Black+Han+Sans&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- html2canvas 라이브러리 (캡처용) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        .font-title { font-family: 'Playfair Display', serif; }
        .capturing .capture-hide { display: none !important; }
        
        /* 템플릿 기본 폰트 */
        .tp-font { font-family: 'Noto Sans KR', sans-serif !important; }

        /* 사용자 입력 내용 폰트 정의 */
        .f-noto { font-family: 'Noto Sans KR', sans-serif !important; }
        .f-myeongjo { font-family: 'Nanum Myeongjo', serif !important; }
        .f-jua { font-family: 'Jua', sans-serif !important; }
        .f-gamja { font-family: 'Gamja Flower', cursive !important; }
        .f-black { font-family: 'Black Han Sans', sans-serif !important; }

        /* 입력 스타일 공통 */
        .real-input, .fake-input { 
            line-height: 1.6; 
            padding: 0 !important;
            margin: 0 !important;
            background: transparent;
            border: none;
            width: 100%;
        }
        
        textarea.auto-expand {
            min-height: 1.6em;
            overflow: hidden;
            resize: none;
            display: block;
        }

        /* [핵심] 캡처 시 레이아웃 고정 및 중복 방지 */
        .fake-input { 
            display: none; 
            word-break: break-all; 
            white-space: pre-wrap; 
            align-items: center;
        }
        
        /* 캡처 모드일 때 real-input을 제거하여 중복 현상 원천 차단 */
        .is-capturing .real-input { display: none !important; }
        .is-capturing .fake-input { display: flex !important; }

        /* 문제 박스 디자인 */
        .question-text-box {
            background-color: rgba(255, 255, 255, 0.94);
            border-radius: 14px;
            padding: 18px 22px;
            border: 1.5px solid rgba(59, 130, 246, 0.5);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
            backdrop-filter: blur(4px);
            width: 100%;
            display: flex;
            align-items: center;
            min-height: 70px; /* 박스 최소 높이 고정으로 정렬 안정화 */
        }

        /* [수정] 캡처 시 박스 디자인이 깨지지 않도록 강제 스타일 적용 */
        .is-capturing .question-text-box {
            background-color: #ffffff !important;
            border: 2px solid #3b82f6 !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }

        /* 폰트 툴바 스타일 */
        .font-toolbar { display: flex; gap: 4px; margin-bottom: 6px; }
        .font-choice-btn {
            background: rgba(248, 250, 252, 0.8);
            color: #64748b;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .font-choice-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }

        .v-center-row { display: flex; align-items: center; }

        /* 갤러리 디자인 */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4 py-8 tp-font relative">

    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-50 font-bold text-sm text-center min-w-[220px]">
        메시지
    </div>

    <!-- 배경 갤러리 패널 -->
    <div class="w-full max-w-lg mb-4 bg-white p-5 rounded-2xl shadow-md border border-gray-100">
        <div class="flex justify-between items-center mb-2 text-sm">
            <span class="font-bold text-gray-700 flex items-center gap-1.5">🖼️ 내 배경 갤러리</span>
            <span id="save-status" class="text-blue-500 font-bold bg-blue-50 px-2 py-0.5 rounded-full text-[10px]">상태: 준비 완료</span>
        </div>
        <div id="image-gallery" class="flex gap-3 overflow-x-auto pb-3 pt-1 items-center min-h-[5.5rem] custom-scrollbar"></div>
        <label class="cursor-pointer mt-3 bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-xl text-sm font-bold transition-all text-center block w-full shadow-sm">
            + 새로운 배경 이미지 추가
            <input type="file" id="bg-upload" class="hidden" accept="image/*">
        </label>
    </div>

    <!-- 캡처 영역 -->
    <div id="capture-area" class="relative w-full max-w-lg shadow-2xl rounded-2xl overflow-hidden bg-white min-h-[950px] flex flex-col border border-gray-100">
        
        <!-- 배경 레이어 -->
        <div id="main-bg-wrap" class="absolute inset-0 pointer-events-none z-0 opacity-40">
            <img id="main-bg-img" src="Gemini_Generated_Image_sed1dused1dused1.png.jpg" alt="Background" class="w-full h-full object-cover object-center select-none" onerror="this.src='https://images.unsplash.com/photo-1499209974431-9dac3adaf471?auto=format&fit=crop&w=1200&q=80'">
        </div>

        <div class="relative z-10 p-7 md:p-9 flex flex-col flex-grow">
            <!-- 상단 제목 -->
            <div class="text-left font-title mb-10">
                <h2 class="text-2xl md:text-3xl font-bold text-gray-700 italic">Boast not tomorrow</h2>
                <h1 class="text-5xl md:text-6xl font-black text-blue-600 mt-2 tracking-tight">Boast in God</h1>
            </div>

            <!-- 주제 영역 -->
            <div id="topic-container" class="mb-12">
                <div class="flex justify-end mb-2">
                    <div class="font-toolbar capture-hide">
                        <button class="font-choice-btn active" onclick="setItemFont('topic-input-wrap', 'f-noto', this)">고딕</button>
                        <button class="font-choice-btn" onclick="setItemFont('topic-input-wrap', 'f-myeongjo', this)">명조</button>
                        <button class="font-choice-btn" onclick="setItemFont('topic-input-wrap', 'f-jua', this)">주아</button>
                        <button class="font-choice-btn" onclick="setItemFont('topic-input-wrap', 'f-gamja', this)">감자</button>
                        <button class="font-choice-btn" onclick="setItemFont('topic-input-wrap', 'f-black', this)">블랙</button>
                    </div>
                </div>
                <div class="v-center-row gap-3">
                    <label class="shrink-0 text-xl md:text-2xl font-bold text-gray-800 tp-font">오늘의 주제 :</label>
                    <div id="topic-input-wrap" class="flex-grow relative f-noto capture-input-wrapper v-center-row">
                        <input type="text" id="topic-input" class="real-input w-full border-b-2 border-gray-400 focus:border-blue-500 outline-none font-bold text-gray-900 px-1" style="font-size: 22px;">
                        <div class="fake-input font-bold text-gray-900 px-1 border-b-2 border-transparent" style="font-size: 22px;"></div>
                    </div>
                </div>
            </div>

            <!-- 퀴즈 리스트 영역 (고정 3문제) -->
            <div class="flex-grow flex flex-col">
                <h3 class="text-xl font-bold text-gray-800 mb-5 tp-font flex items-center gap-2">
                    <span class="w-1.5 h-6 bg-blue-600 rounded-full"></span> 오늘의 퀴즈
                </h3>
                <div id="questions-list" class="space-y-8"></div>
            </div>
        </div>
    </div>

    <!-- 저장 버튼 -->
    <button id="capture-btn" class="mt-8 mb-12 px-12 py-4 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-full shadow-xl transition-all transform hover:scale-105 active:scale-95">
        이미지로 저장하기
    </button>

    <script>
        const fontClasses = ['f-noto', 'f-myeongjo', 'f-jua', 'f-gamja', 'f-black'];

        function setItemFont(targetId, fontClass, btn) {
            const target = document.getElementById(targetId);
            if (!target) return;
            target.classList.remove(...fontClasses);
            target.classList.add(fontClass);
            const toolbar = btn.parentElement;
            toolbar.querySelectorAll('.font-choice-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (targetId === 'topic-input-wrap') setTimeout(adjustTopicFontSize, 50);
        }

        document.addEventListener("DOMContentLoaded", () => {
            const bgImg = document.getElementById('main-bg-img');
            const bgUpload = document.getElementById('bg-upload');
            const galleryEl = document.getElementById('image-gallery');
            const toast = document.getElementById('toast');
            const topicInput = document.getElementById('topic-input');
            const captureArea = document.getElementById('capture-area');
            const captureBtn = document.getElementById('capture-btn');

            let localGallery = JSON.parse(localStorage.getItem('my_gallery') || '[]');
            const savedBg = localStorage.getItem('saved_bg');
            if (savedBg) bgImg.src = savedBg;

            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.remove('opacity-0');
                setTimeout(() => toast.classList.add('opacity-0'), 2500);
            }

            const autoAdjustImage = (base64Str) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height, maxSize = 1400;
                        if (w > maxSize || h > maxSize) {
                            if (w > h) { h = Math.round((h * maxSize) / w); w = maxSize; }
                            else { w = Math.round((w * maxSize) / h); h = maxSize; }
                        }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.88)); 
                    };
                });
            };

            function renderGallery() {
                galleryEl.innerHTML = '';
                if (localGallery.length === 0) {
                    galleryEl.innerHTML = '<div class="text-[10px] text-gray-400 italic px-2">배경 이미지를 추가해 보세요.</div>';
                    return;
                }
                localGallery.forEach(data => {
                    const thumb = document.createElement('div');
                    thumb.className = "relative flex-shrink-0 w-16 h-16 rounded-xl overflow-hidden border-2 border-transparent hover:border-blue-500 cursor-pointer shadow-sm transition-all";
                    const img = document.createElement('img');
                    img.src = data.bgBase64; img.className = "w-full h-full object-cover";
                    img.onclick = () => { bgImg.src = data.bgBase64; localStorage.setItem('saved_bg', data.bgBase64); showToast("배경이 변경되었습니다."); };
                    thumb.append(img); galleryEl.appendChild(thumb);
                });
            }
            renderGallery();

            bgUpload.addEventListener('change', (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const final = await autoAdjustImage(event.target.result);
                    bgImg.src = final;
                    localStorage.setItem('saved_bg', final);
                    localGallery.unshift({ id: Date.now().toString(), bgBase64: final });
                    if (localGallery.length > 8) localGallery.pop(); 
                    localStorage.setItem('my_gallery', JSON.stringify(localGallery));
                    renderGallery();
                    showToast("배경이 추가되었습니다.");
                };
                reader.readAsDataURL(file);
            });

            // 주제 글자 크기 자동 조절
            const measureSpan = document.createElement('span');
            measureSpan.style.visibility = 'hidden'; measureSpan.style.position = 'absolute'; measureSpan.style.whiteSpace = 'nowrap';
            document.body.appendChild(measureSpan);

            window.adjustTopicFontSize = function() {
                const maxWidth = topicInput.clientWidth - 10;
                if (maxWidth <= 0) return;
                measureSpan.style.fontFamily = window.getComputedStyle(topicInput).fontFamily;
                measureSpan.style.fontWeight = "bold";
                measureSpan.textContent = topicInput.value || "\u00A0";
                let fontSize = 22;
                measureSpan.style.fontSize = fontSize + 'px';
                while (measureSpan.offsetWidth > maxWidth && fontSize > 12) {
                    fontSize -= 0.5; measureSpan.style.fontSize = fontSize + 'px';
                }
                topicInput.style.fontSize = fontSize + 'px';
                const fake = topicInput.nextElementSibling;
                if(fake) fake.style.fontSize = fontSize + 'px';
            }
            topicInput.addEventListener('input', adjustTopicFontSize);

            let qCounter = 0;
            const questionsListEl = document.getElementById('questions-list');
            function getCircleNumber(index) { return String.fromCharCode(0x2460 + index); }

            function createOptionHTML(qId, index) {
                return `
                <div class="option-item v-center-row group/opt relative mb-1">
                    <div class="mr-3 min-w-[24px] flex items-center justify-center font-bold text-gray-700 tp-font text-base">
                        <span>${getCircleNumber(index)}</span>
                    </div>
                    <div class="flex-grow relative capture-input-wrapper v-center-row">
                        <input type="text" class="real-input w-full border-b border-gray-200 focus:border-blue-400 outline-none text-base text-gray-800 px-1">
                        <div class="fake-input text-base text-gray-800 px-1 border-b border-transparent"></div>
                    </div>
                </div>`;
            }

            window.createQuestionHTML = function(qId, qIndex, type = 'subjective') {
                const contentId = `q-content-${qId}`;
                const isSub = type === 'subjective';
                return `
                <div class="relative group question-item-wrap" data-q-id="${qId}">
                    <div class="flex justify-end mb-1">
                        <div class="font-toolbar capture-hide">
                            <button class="font-choice-btn active" onclick="setItemFont('${contentId}', 'f-noto', this)">고딕</button>
                            <button class="font-choice-btn" onclick="setItemFont('${contentId}', 'f-myeongjo', this)">명조</button>
                            <button class="font-choice-btn" onclick="setItemFont('${contentId}', 'f-jua', this)">주아</button>
                            <button class="font-choice-btn" onclick="setItemFont('${contentId}', 'f-gamja', this)">감자</button>
                            <button class="font-choice-btn" onclick="setItemFont('${contentId}', 'f-black', this)">블랙</button>
                        </div>
                    </div>
                    <!-- 문제 박스 디자인 -->
                    <div class="question-text-box v-center-row">
                        <div class="mr-4 min-w-[32px] flex items-center justify-center font-black text-blue-600 tp-font text-2xl">
                            <span class="q-num-label">${qIndex}.</span>
                        </div>
                        <div id="${contentId}" class="flex-grow relative f-noto capture-input-wrapper v-center-row">
                            <textarea rows="1" class="real-input auto-expand w-full focus:outline-none text-xl font-bold text-gray-900"></textarea>
                            <div class="fake-input text-xl font-bold text-gray-900"></div>
                        </div>
                    </div>
                    ${!isSub ? `
                        <div class="q-interaction-area pl-6 mt-2">
                            <div class="options-container space-y-1">
                                ${createOptionHTML(qId, 0)}${createOptionHTML(qId, 1)}${createOptionHTML(qId, 2)}
                            </div>
                        </div>
                    ` : ''}
                </div>`;
            }

            document.addEventListener('input', (e) => {
                if (e.target.classList.contains('auto-expand')) {
                    e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px';
                }
            });

            // 초기 로드: 1, 2번 주관식 / 3번 객관식
            questionsListEl.insertAdjacentHTML('beforeend', createQuestionHTML(++qCounter, 1, 'subjective'));
            questionsListEl.insertAdjacentHTML('beforeend', createQuestionHTML(++qCounter, 2, 'subjective'));
            questionsListEl.insertAdjacentHTML('beforeend', createQuestionHTML(++qCounter, 3, 'objective'));

            // 이미지 저장 로직
            captureBtn.onclick = async () => {
                if (captureBtn.disabled) return;
                
                captureBtn.disabled = true;
                captureBtn.textContent = '이미지 제작 중...';
                document.body.classList.add('capturing');
                captureArea.classList.add('is-capturing');
                
                // 캡처 전 화면 상단 고정
                window.scrollTo(0, 0);

                // 입력값 전이 및 스타일 동기화
                document.querySelectorAll('.capture-input-wrapper').forEach(w => {
                    const real = w.querySelector('.real-input'), fake = w.querySelector('.fake-input');
                    if (real && fake) {
                        fake.textContent = real.value || '\u00A0';
                        const computedStyle = window.getComputedStyle(real);
                        fake.style.fontFamily = computedStyle.fontFamily;
                        fake.style.fontSize = computedStyle.fontSize;
                        fake.style.fontWeight = computedStyle.fontWeight;
                        fake.style.color = computedStyle.color;
                    }
                });

                // 브라우저 렌더링 동기화 대기
                await new Promise(r => setTimeout(r, 800));

                try {
                    const canvas = await html2canvas(captureArea, { 
                        useCORS: true, 
                        scale: 3, /* 고화질 저장을 위해 스케일 상향 */
                        backgroundColor: '#ffffff', 
                        logging: false,
                        allowTaint: true,
                        // 캡처 시 레이아웃 흔들림 방지 옵션
                        width: captureArea.offsetWidth,
                        height: captureArea.offsetHeight
                    });
                    
                    canvas.toBlob((blob) => {
                        if (!blob) {
                            showToast("이미지 생성을 실패했습니다.");
                            return;
                        }
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement("a");
                        link.href = url;
                        link.download = `Boast_Card_${new Date().getTime()}.png`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        setTimeout(() => URL.revokeObjectURL(url), 200);
                        showToast("성공적으로 저장되었습니다.");
                    }, "image/png");

                } catch (err) { 
                    console.error(err);
                    showToast("저장 중 오류가 발생했습니다."); 
                } finally {
                    document.body.classList.remove('capturing');
                    captureArea.classList.remove('is-capturing');
                    captureBtn.disabled = false;
                    captureBtn.textContent = '이미지로 저장하기';
                }
            };
        });
    </script>
</body>
</html>
