<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boast in God</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // =====================================================================
        // 🚀 [필독] Vercel 배포 시 다른 사람과 배경 갤러리를 완벽하게 공유하는 방법
        // =====================================================================
        const myFirebaseConfig = null; /* 예시: {
            apiKey: "AIzaSy...",
            authDomain: "...",
            projectId: "...",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        }; */
        const myAppId = "boast-in-god-shared-gallery"; // 공유될 고유 방 이름
        // =====================================================================

        window.firebaseApp = null; 

        try {
            let firebaseConfig = null;
            let appId = myAppId;

            // 1. 현재 화면(Canvas 미리보기) 환경의 내장 클라우드 자동 연결
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
                appId = typeof __app_id !== 'undefined' ? __app_id : myAppId;
            } 
            // 2. Vercel 배포 후 본인의 Firebase 설정을 입력했을 때 연결
            else if (myFirebaseConfig) {
                firebaseConfig = myFirebaseConfig;
            }

            if (firebaseConfig) {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);
                window.firebaseApp = { auth, db, appId, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc, signInAnonymously, signInWithCustomToken, onAuthStateChanged };
            }
        } catch (error) {
            console.warn("로컬 모드로 작동합니다.");
        }
    </script>

    <style>
        .font-title { font-family: 'Playfair Display', serif; }
        .font-noto { font-family: 'Noto Sans KR', sans-serif; }
        .capturing .capture-hide { display: none !important; }
        
        /* 갤러리 가로 스크롤바 디자인 */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4 py-8 font-noto relative">

    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-50 font-bold text-sm">
        알림 메시지
    </div>

    <div class="w-full max-w-lg mb-4 flex flex-col gap-2 bg-white p-4 rounded-xl shadow-md border border-gray-200">
        <div class="flex justify-between items-center mb-1">
            <span class="font-bold text-gray-800 flex items-center gap-1">🖼️ 내 배경 갤러리</span>
            <span id="save-status" class="text-xs text-blue-600 font-bold bg-blue-50 px-2 py-1 rounded-full">상태: 연결 중...</span>
        </div>
        
        <div id="image-gallery" class="flex gap-3 overflow-x-auto pb-2 pt-1 items-center min-h-[5rem] custom-scrollbar">
            <div class="text-xs text-gray-400 italic px-2">데이터를 불러오는 중입니다...</div>
        </div>

        <label class="cursor-pointer mt-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg text-sm font-bold transition-colors text-center block w-full shadow-sm">
            + 새 배경 이미지 추가 (최대 50MB)
            <input type="file" id="bg-upload" class="hidden" accept="image/*">
        </label>
        <p class="text-[10px] text-gray-400 text-center">* 추가한 이미지는 갤러리에 영구 저장되어 언제든 다시 누르면 변경됩니다.</p>
    </div>

    <div id="capture-area" class="relative w-full max-w-lg shadow-2xl rounded-xl overflow-hidden bg-white min-h-[850px] flex flex-col">
        
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0">
            <img id="main-bg-img" src="Gemini_Generated_Image_sed1dused1dused1.png.jpg" alt="Background" class="w-full h-full object-cover opacity-30 select-none">
        </div>

        <div class="relative z-10 p-6 md:p-8 flex flex-col flex-grow">
            <div class="text-left font-title">
                <h2 class="text-2xl md:text-3xl font-bold text-gray-700 italic">Boast not tomorrow</h2>
                <h1 class="text-4xl md:text-5xl font-black text-blue-600 mt-2 tracking-wide">Boast in God</h1>
            </div>

            <div class="mt-6 md:mt-8 flex items-center gap-3 capture-input-wrapper">
                <label class="shrink-0 text-lg md:text-xl font-bold text-gray-800">오늘의 주제 :</label>
                <div class="flex-grow relative">
                    <input type="text" id="topic-input" value="" placeholder="주제를 입력하세요" class="real-input w-full bg-white bg-opacity-70 border-b-2 border-gray-400 focus:border-blue-500 outline-none text-lg md:text-xl font-bold text-gray-800 px-2 py-1 rounded transition-colors">
                    <div class="fake-input hidden w-full text-lg md:text-xl font-bold text-gray-800 px-2 py-1 min-h-[40px] border-b-2 border-transparent"></div>
                </div>
            </div>

            <div class="mt-6 md:mt-8 flex-grow flex flex-col">
                <h3 class="text-xl md:text-2xl font-bold text-gray-800 mb-4">오늘의 퀴즈</h3>
                <div id="questions-list"></div>
                <button id="add-q-btn" class="capture-hide mt-2 mb-6 py-2 px-4 border-2 border-dashed border-gray-400 text-gray-600 rounded-lg hover:bg-white hover:bg-opacity-50 hover:border-gray-600 hover:text-gray-900 transition-colors font-bold flex items-center justify-center gap-2">
                    <span>+</span> 문제 추가하기
                </button>
            </div>
        </div>
    </div>

    <button id="capture-btn" class="mt-8 px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-full shadow-lg transition-all transform hover:scale-105 font-noto">
        이미지로 저장하기
    </button>

    <script type="module">
        document.addEventListener("DOMContentLoaded", async () => {
            const bgImg = document.getElementById('main-bg-img');
            const bgUpload = document.getElementById('bg-upload');
            const saveStatus = document.getElementById('save-status');
            const galleryEl = document.getElementById('image-gallery');
            const toast = document.getElementById('toast');

            let localGallery = []; // 오프라인용 메모리 갤러리

            function showToast(msg, isError = false) {
                toast.textContent = msg;
                toast.className = `fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-xl transition-opacity duration-300 pointer-events-none z-50 font-bold text-sm ${isError ? 'bg-red-600 text-white' : 'bg-gray-800 text-white'}`;
                toast.classList.remove('opacity-0');
                setTimeout(() => toast.classList.add('opacity-0'), 3000);
            }

            const compressImage = (base64Str, maxWidth = 1000) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                });
            };

            function renderGallery(docs) {
                galleryEl.innerHTML = '';
                
                if (docs.length === 0) {
                    galleryEl.innerHTML = '<div class="text-xs text-gray-500 italic px-2">저장된 배경이 없습니다. 이미지를 추가해주세요.</div>';
                    return;
                }

                docs.forEach(data => {
                    const thumbWrapper = document.createElement('div');
                    thumbWrapper.className = "relative flex-shrink-0 w-16 h-16 rounded-lg overflow-hidden border-2 border-transparent hover:border-blue-500 cursor-pointer group shadow-sm transition-all transform hover:scale-105 bg-gray-200";
                    
                    const img = document.createElement('img');
                    img.src = data.bgBase64;
                    img.className = "w-full h-full object-cover";
                    
                    img.onclick = async () => { 
                        bgImg.src = data.bgBase64; 
                        
                        if (window.firebaseApp && window.firebaseApp.auth.currentUser) {
                            try {
                                const { db, appId, doc, setDoc } = window.firebaseApp;
                                const configDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main');
                                await setDoc(configDocRef, { bgBase64: data.bgBase64 }, { merge: true });
                                showToast("배경이 변경 및 공유되었습니다.");
                            } catch (err) {
                                showToast("배경이 변경되었으나 클라우드 공유에 실패했습니다.", true);
                            }
                        } else {
                            localStorage.setItem('saved_bg', data.bgBase64);
                            showToast("배경이 변경되었습니다. (개인 로컬 저장)");
                        }
                    };

                    const delBtn = document.createElement('button');
                    delBtn.innerHTML = "✕";
                    delBtn.className = "absolute top-0 right-0 bg-red-500 bg-opacity-80 text-white rounded-bl-lg w-5 h-5 flex items-center justify-center text-[10px] font-bold opacity-0 group-hover/opt:opacity-100 transition-opacity hover:bg-opacity-100";
                    
                    delBtn.onclick = async (e) => {
                        e.stopPropagation();
                        if (window.firebaseApp && window.firebaseApp.auth.currentUser && data.id) {
                            saveStatus.textContent = "상태: 삭제 중...";
                            try {
                                const { db, appId, doc, deleteDoc } = window.firebaseApp;
                                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'backgrounds', data.id));
                                saveStatus.textContent = "상태: 연결됨";
                            } catch (err) {
                                saveStatus.textContent = "상태: 삭제 실패";
                                showToast("삭제 중 오류가 발생했습니다.", true);
                            }
                        } else {
                            localGallery = localGallery.filter(item => item.id !== data.id);
                            renderGallery(localGallery);
                        }
                    };

                    thumbWrapper.appendChild(img);
                    thumbWrapper.appendChild(delBtn);
                    galleryEl.appendChild(thumbWrapper);
                });
            }

            if (window.firebaseApp) {
                const { auth, db, appId, doc, collection, onSnapshot, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.firebaseApp;
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    
                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            saveStatus.textContent = "상태: 클라우드 연결됨 (공유 중)";
                            const bgCollectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'backgrounds');
                            
                            onSnapshot(bgCollectionRef, (snap) => {
                                const docs = [];
                                snap.forEach(docSnap => docs.push({ id: docSnap.id, ...docSnap.data() }));
                                docs.sort((a, b) => b.timestamp - a.timestamp);
                                renderGallery(docs);
                            }, (err) => console.error("Snapshot error:", err));

                            const configDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main');
                            onSnapshot(configDocRef, (snap) => {
                                if (snap.exists() && snap.data().bgBase64) {
                                    bgImg.src = snap.data().bgBase64;
                                }
                            }, (err) => console.error("Snapshot config error:", err));
                        }
                    });
                } catch (err) {
                    saveStatus.textContent = "상태: 오프라인 모드 (개인)";
                    const savedBg = localStorage.getItem('saved_bg');
                    if (savedBg) {
                        bgImg.src = savedBg;
                    }
                    renderGallery(localGallery);
                }
            } else {
                saveStatus.textContent = "상태: 외부 호스팅 (공유 불가)";
                const savedBg = localStorage.getItem('saved_bg');
                if (savedBg) {
                    bgImg.src = savedBg;
                }
                renderGallery(localGallery);
                showToast("현재 개인 모드입니다. 갤러리 공유를 위해 코드 내 Firebase 설정을 확인해주세요.", true);
            }

            bgUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                if (file.size > 50000000) { 
                    showToast("이미지 크기가 너무 큽니다 (최대 50MB).", true);
                    return;
                }

                saveStatus.textContent = "상태: 최적화 중...";
                const reader = new FileReader();
                reader.onload = async (event) => {
                    let finalBase64 = event.target.result;
                    
                    if (file.size > 800000) {
                        finalBase64 = await compressImage(finalBase64);
                    }

                    if (finalBase64.length > 1000000) {
                        saveStatus.textContent = "상태: 용량 초과";
                        showToast("이미지가 너무 복잡하여 저장할 수 없습니다. 다른 이미지를 시도해주세요.", true);
                        return;
                    }
                    
                    bgImg.src = finalBase64; 

                    if (window.firebaseApp && window.firebaseApp.auth.currentUser) {
                        saveStatus.textContent = "상태: 갤러리 업로드 중...";
                        try {
                            const { db, appId, collection, addDoc, doc, setDoc } = window.firebaseApp;
                            
                            const bgCollectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'backgrounds');
                            await addDoc(bgCollectionRef, { bgBase64: finalBase64, timestamp: Date.now() });
                            
                            const configDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main');
                            await setDoc(configDocRef, { bgBase64: finalBase64 }, { merge: true });

                            saveStatus.textContent = "상태: 클라우드 연결됨 (공유 중)";
                            showToast("갤러리에 성공적으로 공유되었습니다.");
                        } catch (err) {
                            saveStatus.textContent = "상태: 저장 실패";
                            showToast("클라우드 공유에 실패했습니다. (용량 초과 가능성)", true);
                            console.error(err);
                        }
                    } else {
                        localGallery.unshift({ id: Date.now().toString(), bgBase64: finalBase64, timestamp: Date.now() });
                        localStorage.setItem('saved_bg', finalBase64);
                        renderGallery(localGallery);
                        saveStatus.textContent = "상태: 개인 임시 저장 완료";
                        showToast("개인 갤러리에 추가되었습니다.");
                    }
                    bgUpload.value = ''; 
                };
                reader.readAsDataURL(file);
            });

            let qCounter = 0;
            let optCounter = 0;
            const questionsListEl = document.getElementById('questions-list');
            const addQBtn = document.getElementById('add-q-btn');
            const captureBtn = document.getElementById('capture-btn');

            function getCircleNumber(index) { return String.fromCharCode(0x2460 + index); }

            function createOptionHTML(qId, optId, index) {
                return `
                <div class="option-item flex items-center group/opt relative mb-2" data-opt-id="${optId}">
                    <label class="opt-label text-base md:text-lg font-bold mr-2 min-w-[28px] text-gray-800">${getCircleNumber(index)}</label>
                    <div class="relative w-full flex items-center capture-input-wrapper">
                        <input type="text" placeholder="선택지 입력" class="real-input w-full bg-white bg-opacity-70 border-b-2 border-gray-700 focus:border-blue-500 outline-none text-base md:text-lg text-gray-800 px-2 py-1 rounded transition-colors pr-8">
                        <div class="fake-input hidden w-full border-b-2 border-gray-700 text-base md:text-lg text-gray-800 px-2 py-1 min-h-[36px]"></div>
                        <button type="button" class="remove-opt-btn capture-hide absolute right-1 text-gray-400 hover:text-red-500 font-bold opacity-0 group-hover/opt:opacity-100 transition-opacity" title="선택지 삭제">✕</button>
                    </div>
                </div>`;
            }

            function createQuestionHTML(qId, qIndex) {
                return `
                <div class="question-item mb-8 relative group" data-q-id="${qId}">
                    <div class="flex items-start">
                        <span class="q-number text-lg md:text-xl font-bold mr-2 mt-1">${qIndex}.</span>
                        <div class="relative w-full capture-input-wrapper">
                            <textarea placeholder="${qIndex}번째 문제를 입력하세요" class="real-input w-full h-12 bg-white bg-opacity-70 border-b-2 border-gray-400 focus:border-blue-500 outline-none text-base md:text-lg text-gray-800 px-3 py-2 resize-none transition-colors rounded pr-8 shadow-sm"></textarea>
                            <div class="fake-input hidden w-full text-base md:text-lg text-gray-800 px-2 py-1 min-h-[3rem] whitespace-pre-wrap border-b-2 border-transparent"></div>
                            <button type="button" class="remove-q-btn capture-hide absolute top-2 right-2 text-red-500 hover:text-red-700 bg-white bg-opacity-90 rounded-full w-6 h-6 flex items-center justify-center font-bold opacity-0 group-hover:opacity-100 transition-opacity shadow" title="문제 삭제">✕</button>
                        </div>
                    </div>
                    <div class="options-container mt-1 pl-6">
                        ${createOptionHTML(qId, ++optCounter, 0)}
                        ${createOptionHTML(qId, ++optCounter, 1)}
                        ${createOptionHTML(qId, ++optCounter, 2)}
                    </div>
                    <button type="button" class="add-opt-btn capture-hide mt-1 pl-6 text-sm text-blue-700 hover:text-blue-900 font-bold flex items-center gap-1 transition-colors"><span>+</span> 선택지 추가</button>
                </div>`;
            }

            function updateQuestionNumbers() {
                document.querySelectorAll('.question-item').forEach((q, idx) => {
                    q.querySelector('.q-number').textContent = `${idx + 1}.`;
                    q.querySelector('textarea.real-input').placeholder = `${idx + 1}번째 문제를 입력하세요`;
                });
            }

            function updateOptionNumbers(qItem) {
                qItem.querySelectorAll('.option-item').forEach((opt, idx) => {
                    opt.querySelector('.opt-label').textContent = getCircleNumber(idx);
                });
            }

            questionsListEl.addEventListener('click', (e) => {
                if (e.target.closest('.remove-q-btn')) { e.target.closest('.question-item').remove(); updateQuestionNumbers(); }
                if (e.target.closest('.add-opt-btn')) {
                    const qItem = e.target.closest('.question-item');
                    qItem.querySelector('.options-container').insertAdjacentHTML('beforeend', createOptionHTML(qItem.dataset.qId, ++optCounter, qItem.querySelectorAll('.option-item').length));
                }
                if (e.target.closest('.remove-opt-btn')) {
                    const qItem = e.target.closest('.question-item');
                    e.target.closest('.option-item').remove();
                    updateOptionNumbers(qItem);
                }
            });

            addQBtn.addEventListener('click', () => {
                questionsListEl.insertAdjacentHTML('beforeend', createQuestionHTML(++qCounter, document.querySelectorAll('.question-item').length + 1));
            });

            questionsListEl.insertAdjacentHTML('beforeend', createQuestionHTML(++qCounter, 1));
            questionsListEl.insertAdjacentHTML('beforeend', createQuestionHTML(++qCounter, 2));
            questionsListEl.insertAdjacentHTML('beforeend', createQuestionHTML(++qCounter, 3));

            captureBtn.addEventListener('click', async () => {
                if (typeof html2canvas === 'undefined') {
                    showToast("이미지 생성 기능을 준비 중입니다.", true);
                    return;
                }
                const captureArea = document.getElementById('capture-area');
                document.body.classList.add('capturing');
                captureBtn.textContent = '이미지 생성 중...';

                document.querySelectorAll('.capture-input-wrapper').forEach(wrapper => {
                    const real = wrapper.querySelector('.real-input');
                    const fake = wrapper.querySelector('.fake-input');
                    fake.textContent = real.value || '\u00A0';
                    real.classList.add('hidden');
                    fake.classList.remove('hidden');
                });

                window.scrollTo(0, 0);
                await new Promise(r => setTimeout(r, 300));

                try {
                    const canvas = await html2canvas(captureArea, { useCORS: true, scale: 2, backgroundColor: '#ffffff' });
                    const link = document.createElement("a");
                    link.href = canvas.toDataURL("image/png");
                    link.download = `Boast_in_God_${new Date().toISOString().slice(0, 10)}.png`;
                    link.click();
                } catch (err) {
                    showToast("이미지 캡처 중 오류가 발생했습니다.", true);
                } finally {
                    document.body.classList.remove('capturing');
                    document.querySelectorAll('.real-input').forEach(el => el.classList.remove('hidden'));
                    document.querySelectorAll('.fake-input').forEach(el => el.classList.add('hidden'));
                    captureBtn.textContent = '이미지로 저장하기';
                }
            });
        });
    </script>
</body>
</html>
