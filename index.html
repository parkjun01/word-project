<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boast in God</title>

    <!-- 구글 웹폰트 연동 -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Noto+Sans+KR:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Jua&family=Gamja+Flower&family=Black+Han+Sans&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- html2canvas 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        .font-title { font-family: 'Playfair Display', serif; }
        .capturing .capture-hide { display: none !important; }
        
        /* [중요] 템플릿 기본 폰트 (라벨, 번호 등 고정) */
        .tp-font { font-family: 'Noto Sans KR', sans-serif !important; }

        /* [중요] 사용자 입력 내용 폰트 정의 */
        .f-noto { font-family: 'Noto Sans KR', sans-serif !important; }
        .f-myeongjo { font-family: 'Nanum Myeongjo', serif !important; }
        .f-jua { font-family: 'Jua', sans-serif !important; }
        .f-gamja { font-family: 'Gamja Flower', cursive !important; }
        .f-black { font-family: 'Black Han Sans', sans-serif !important; }

        /* 갤러리 가로 스크롤바 디자인 */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 세로 중앙 정렬 최적화 */
        .q-number-box { line-height: 1; display: flex; align-items: center; justify-content: center; height: 100%; }
        .opt-label-box { line-height: 1; display: flex; align-items: center; justify-content: center; height: 100%; }
        
        /* 텍스트 줄높이 */
        .real-input, .fake-input { line-height: 1.6; }
        
        textarea.auto-expand {
            min-height: 44px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }
        
        .q-input-style {
            padding-top: 10px;
            padding-bottom: 10px;
        }

        /* 개별 폰트 툴바 스타일 */
        .font-toolbar {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
        }
        .font-choice-btn {
            background: #f8fafc;
            color: #64748b;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .font-choice-btn:hover { background: #f1f5f9; }
        .font-choice-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4 py-8 tp-font relative">

    <!-- 커스텀 알림창 -->
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-50 font-bold text-sm">
        알림 메시지
    </div>

    <!-- 배경 갤러리 컨트롤 바 -->
    <div class="w-full max-w-lg mb-4 bg-white p-4 rounded-xl shadow-md border border-gray-200">
        <div class="flex justify-between items-center mb-1">
            <span class="font-bold text-gray-800 flex items-center gap-1 text-sm">🖼️ 배경 갤러리</span>
            <span id="save-status" class="text-[10px] text-blue-600 font-bold bg-blue-50 px-2 py-1 rounded-full">상태: 준비 완료</span>
        </div>
        <div id="image-gallery" class="flex gap-3 overflow-x-auto pb-2 pt-1 items-center min-h-[5rem] custom-scrollbar">
            <div class="text-xs text-gray-400 italic px-2">데이터를 불러오는 중입니다...</div>
        </div>
        <label class="cursor-pointer mt-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg text-sm font-bold transition-colors text-center block w-full shadow-sm">
            + 새 배경 추가
            <input type="file" id="bg-upload" class="hidden" accept="image/*">
        </label>
    </div>

    <!-- 캡처될 영역 -->
    <div id="capture-area" class="relative w-full max-w-lg shadow-2xl rounded-xl overflow-hidden bg-white min-h-[850px] flex flex-col border border-gray-100">
        
        <!-- 워터마크 배경 이미지 (대체 이미지 로드 기능 제거 유지) -->
        <div id="main-bg-wrap" class="absolute inset-0 pointer-events-none z-0 opacity-30">
            <img id="main-bg-img" src="Gemini_Generated_Image_sed1dused1dused1.png.jpg" alt="Background" class="w-full h-full object-cover object-center select-none">
        </div>

        <div class="relative z-10 p-6 md:p-8 flex flex-col flex-grow">
            <!-- 고정 제목 -->
            <div class="text-left font-title">
                <h2 class="text-2xl md:text-3xl font-bold text-gray-700 italic">Boast not tomorrow</h2>
                <h1 class="text-4xl md:text-5xl font-black text-blue-600 mt-2 tracking-wide">Boast in God</h1>
            </div>

            <!-- 오늘의 주제 섹션 -->
            <div id="topic-container" class="mt-6 md:mt-8 flex flex-col f-noto">
                <div class="flex items-center justify-between">
                    <label class="shrink-0 text-lg md:text-xl font-bold text-gray-800 tp-font">오늘의 주제 :</label>
                    <!-- 폰트 툴바 -->
                    <div class="font-toolbar capture-hide" data-target="topic-input-wrap">
                        <button class="font-choice-btn active" onclick="setItemFont('topic-input-wrap', 'f-noto', this)">고딕</button>
                        <button class="font-choice-btn" onclick="setItemFont('topic-input-wrap', 'f-myeongjo', this)">명조</button>
                        <button class="font-choice-btn" onclick="setItemFont('topic-input-wrap', 'f-jua', this)">주아</button>
                        <button class="font-choice-btn" onclick="setItemFont('topic-input-wrap', 'f-gamja', this)">감자</button>
                        <button class="font-choice-btn" onclick="setItemFont('topic-input-wrap', 'f-black', this)">블랙</button>
                    </div>
                </div>
                <div id="topic-input-wrap" class="mt-1 relative w-full overflow-hidden flex items-center capture-input-wrapper f-noto">
                    <input type="text" id="topic-input" value="" placeholder="주제를 먼저 고르고 입력하세요" class="real-input w-full bg-white bg-opacity-70 border-b-2 border-gray-400 focus:border-blue-500 outline-none font-bold text-gray-800 px-2 py-1 rounded transition-colors" style="font-size: 20px;">
                    <!-- 중복 표시 방지: hidden을 뒤로 배치하고 flex를 제거하여 초기에는 절대 안 보이게 설정 -->
                    <div class="fake-input w-full font-bold text-gray-800 px-2 py-1 min-h-[40px] border-b-2 border-transparent whitespace-nowrap overflow-hidden hidden" style="font-size: 20px;"></div>
                </div>
            </div>

            <!-- 오늘의 퀴즈 영역 -->
            <div class="mt-6 md:mt-8 flex-grow flex flex-col">
                <h3 class="text-xl md:text-2xl font-bold text-gray-800 mb-4 tp-font">오늘의 퀴즈</h3>
                <div id="questions-list"></div>
                <button id="add-q-btn" class="capture-hide mt-2 mb-6 py-2 px-4 border-2 border-dashed border-gray-400 text-gray-600 rounded-lg hover:bg-white hover:bg-opacity-50 hover:border-gray-600 hover:text-gray-900 transition-colors font-bold flex items-center justify-center gap-2 tp-font">
                    <span>+</span> 문제 추가하기
                </button>
            </div>
        </div>
    </div>

    <button id="capture-btn" class="mt-8 px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-full shadow-lg transition-all transform hover:scale-105">
        이미지로 저장하기
    </button>

    <script>
        const fontClasses = ['f-noto', 'f-myeongjo', 'f-jua', 'f-gamja', 'f-black'];

        // 특정 영역의 폰트를 설정하는 함수
        function setItemFont(targetId, fontClass, btn) {
            const target = document.getElementById(targetId);
            if (!target) return;

            target.classList.remove(...fontClasses);
            target.classList.add(fontClass);

            const toolbar = btn.parentElement;
            toolbar.querySelectorAll('.font-choice-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (targetId === 'topic-input-wrap') {
                setTimeout(adjustTopicFontSize, 50);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const bgImg = document.getElementById('main-bg-img');
            const bgUpload = document.getElementById('bg-upload');
            const galleryEl = document.getElementById('image-gallery');
            const toast = document.getElementById('toast');
            const topicInput = document.getElementById('topic-input');
            const fakeTopicInput = topicInput.nextElementSibling;

            let localGallery = JSON.parse(localStorage.getItem('my_gallery') || '[]');
            const savedBg = localStorage.getItem('saved_bg');
            if (savedBg) { bgImg.src = savedBg; }

            function showToast(msg, isError = false) {
                toast.textContent = msg;
                toast.className = `fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-xl transition-opacity duration-300 pointer-events-none z-50 font-bold text-sm ${isError ? 'bg-red-600 text-white' : 'bg-gray-800 text-white'}`;
                toast.classList.remove('opacity-0');
                setTimeout(() => toast.classList.add('opacity-0'), 3000);
            }

            const autoAdjustImage = (base64Str, maxSize = 1200) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > maxSize || h > maxSize) {
                            if (w > h) { h = Math.round((h * maxSize) / w); w = maxSize; }
                            else { w = Math.round((w * maxSize) / h); h = maxSize; }
                        }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.8)); 
                    };
                });
            };

            function renderGallery() {
                galleryEl.innerHTML = '';
                if (localGallery.length === 0) {
                    galleryEl.innerHTML = '<div class="text-[10px] text-gray-500 italic px-2">배경을 추가해주세요.</div>';
                    return;
                }
                localGallery.forEach(data => {
                    const thumb = document.createElement('div');
                    thumb.className = "relative flex-shrink-0 w-14 h-14 rounded-lg overflow-hidden border-2 border-transparent hover:border-blue-500 cursor-pointer shadow-sm transform hover:scale-105 transition-all bg-gray-200";
                    const img = document.createElement('img');
                    img.src = data.bgBase64; img.className = "w-full h-full object-cover";
                    img.onclick = () => { 
                        bgImg.src = data.bgBase64;
                        localStorage.setItem('saved_bg', data.bgBase64);
                        showToast("배경이 변경되었습니다.");
                    };
                    thumb.append(img); galleryEl.appendChild(thumb);
                });
            }

            renderGallery();

            bgUpload.addEventListener('change', (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const final = await autoAdjustImage(event.target.result);
                    bgImg.src = final;
                    localStorage.setItem('saved_bg', final);
                    localGallery.unshift({ id: Date.now().toString(), bgBase64: final });
                    if (localGallery.length > 5) localGallery.pop(); 
                    try {
                        localStorage.setItem('my_gallery', JSON.stringify(localGallery));
                    } catch (e) {
                        showToast("저장 공간이 부족합니다.", true);
                    }
                    renderGallery();
                    showToast("배경이 추가되었습니다.");
                };
                reader.readAsDataURL(file);
            });

            // --- 오늘의 주제 자동 조절 ---
            const measureSpan = document.createElement('span');
            measureSpan.style.visibility = 'hidden'; measureSpan.style.position = 'absolute'; measureSpan.style.whiteSpace = 'nowrap';
            measureSpan.className = 'font-bold px-2'; document.body.appendChild(measureSpan);

            window.adjustTopicFontSize = function() {
                const maxWidth = topicInput.clientWidth - 16;
                if (maxWidth <= 0) return;
                measureSpan.style.fontFamily = window.getComputedStyle(topicInput).fontFamily;
                measureSpan.textContent = topicInput.value || topicInput.placeholder;
                let fontSize = 20;
                measureSpan.style.fontSize = fontSize + 'px';
                while (measureSpan.offsetWidth > maxWidth && fontSize > 10) {
                    fontSize -= 0.5; measureSpan.style.fontSize = fontSize + 'px';
                }
                topicInput.style.fontSize = fontSize + 'px';
                fakeTopicInput.style.fontSize = fontSize + 'px';
            }
            topicInput.addEventListener('input', adjustTopicFontSize);
            window.addEventListener('resize', adjustTopicFontSize);

            // --- 문제 및 선택지 생성 ---
            let qCounter = 0, optCounter = 0;
            const questionsListEl = document.getElementById('questions-list');
            const addQBtn = document.getElementById('add-q-btn');
            const captureBtn = document.getElementById('capture-btn');

            function getCircleNumber(index) { return String.fromCharCode(0x2460 + index); }

            function createOptionHTML(qId, optId, index) {
                return `
                <div class="option-item flex items-center group/opt relative mb-1" data-opt-id="${optId}">
                    <div class="opt-label-box mr-2 min-w-[28px] flex items-center justify-center"><span class="opt-label text-base md:text-lg font-bold text-gray-800 tp-font">${getCircleNumber(index)}</span></div>
                    <div class="relative w-full flex items-center capture-input-wrapper">
                        <input type="text" placeholder="선택지 입력" class="real-input w-full bg-white bg-opacity-70 border-b-2 border-gray-700 focus:border-blue-500 outline-none text-base md:text-lg text-gray-800 px-2 py-1.5 rounded transition-colors pr-8">
                        <div class="fake-input w-full border-b-2 border-gray-700 text-base md:text-lg text-gray-800 px-2 py-1.5 min-h-[36px] hidden"></div>
                        <button type="button" class="remove-opt-btn capture-hide absolute right-1 text-gray-400 hover:text-red-500 font-bold opacity-0 group-hover/opt:opacity-100">✕</button>
                    </div>
                </div>`;
            }

            window.createQuestionHTML = function(qId, qIndex) {
                const contentId = `q-content-${qId}`;
                return `
                <div class="question-item mb-6 relative group" data-q-id="${qId}">
                    <div class="flex items-center justify-between mb-1">
                         <div class="q-number-box mr-2 min-w-[24px] flex items-center justify-center"><span class="q-number text-lg md:text-xl font-bold text-gray-800 tp-font">${qIndex}.</span></div>
                         <div class="font-toolbar capture-hide">
                            <button class="font-choice-btn active" onclick="setItemFont('${contentId}', 'f-noto', this)">고딕</button>
                            <button class="font-choice-btn" onclick="setItemFont('${contentId}', 'f-myeongjo', this)">명조</button>
                            <button class="font-choice-btn" onclick="setItemFont('${contentId}', 'f-jua', this)">주아</button>
                            <button class="font-choice-btn" onclick="setItemFont('${contentId}', 'f-gamja', this)">감자</button>
                            <button class="font-choice-btn" onclick="setItemFont('${contentId}', 'f-black', this)">블랙</button>
                        </div>
                    </div>
                    <div id="${contentId}" class="f-noto">
                        <div class="relative w-full capture-input-wrapper flex items-center">
                            <textarea rows="1" placeholder="문제를 먼저 고르고 입력하세요" class="real-input auto-expand q-input-style w-full bg-white bg-opacity-70 border-b-2 border-gray-400 focus:border-blue-500 outline-none text-base md:text-lg text-gray-800 px-3 resize-none rounded pr-8 shadow-sm overflow-hidden"></textarea>
                            <div class="fake-input w-full text-base md:text-lg text-gray-800 px-3 q-input-style min-h-[44px] whitespace-pre-wrap border-b-2 border-transparent hidden"></div>
                            <button type="button" class="remove-q-btn capture-hide absolute top-2 right-2 text-red-500 bg-white bg-opacity-90 rounded-full w-6 h-6 flex items-center justify-center font-bold opacity-0 group-hover:opacity-100 shadow">✕</button>
                        </div>
                        <div class="options-container pl-8 mt-1">
                            ${createOptionHTML(qId, ++optCounter, 0)}${createOptionHTML(qId, ++optCounter, 1)}${createOptionHTML(qId, ++optCounter, 2)}
                        </div>
                    </div>
                    <button type="button" class="add-opt-btn capture-hide mt-1 pl-8 text-xs text-blue-700 font-bold tp-font">+ 선택지 추가</button>
                </div>`;
            }

            questionsListEl.addEventListener('click', (e) => {
                if (e.target.closest('.remove-q-btn')) { e.target.closest('.question-item').remove(); updateNums(); }
                if (e.target.closest('.add-opt-btn')) {
                    const q = e.target.closest('.question-item');
                    q.querySelector('.options-container').insertAdjacentHTML('beforeend', createOptionHTML(q.dataset.qId, ++optCounter, q.querySelectorAll('.option-item').length));
                }
                if (e.target.closest('.remove-opt-btn')) {
                    const q = e.target.closest('.question-item'); e.target.closest('.option-item').remove(); updateOptNums(q);
                }
            });

            document.addEventListener('input', (e) => {
                if (e.target.classList.contains('auto-expand')) {
                    e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px';
                }
            });

            function updateNums() {
                document.querySelectorAll('.question-item').forEach((q, idx) => {
                    q.querySelector('.q-number').textContent = `${idx + 1}.`;
                });
            }
            function updateOptNums(q) {
                q.querySelectorAll('.option-item').forEach((opt, idx) => {
                    opt.querySelector('.opt-label').textContent = getCircleNumber(idx);
                });
            }

            addQBtn.onclick = () => {
                questionsListEl.insertAdjacentHTML('beforeend', createQuestionHTML(++qCounter, document.querySelectorAll('.question-item').length + 1));
            };

            questionsListEl.insertAdjacentHTML('beforeend', createQuestionHTML(++qCounter, 1));
            questionsListEl.insertAdjacentHTML('beforeend', createQuestionHTML(++qCounter, 2));

            captureBtn.onclick = async () => {
                const area = document.getElementById('capture-area');
                document.body.classList.add('capturing');
                captureBtn.textContent = '이미지 생성 중...';
                
                document.querySelectorAll('.capture-input-wrapper').forEach(w => {
                    const r = w.querySelector('.real-input'), f = w.querySelector('.fake-input');
                    f.textContent = r.value || '\u00A0'; 
                    r.classList.add('hidden'); 
                    f.classList.remove('hidden');
                    // 캡처 시 중앙 정렬을 위한 클래스 추가
                    f.classList.add('flex', 'items-center');
                });

                window.scrollTo(0, 0); await new Promise(r => setTimeout(r, 400));
                try {
                    const canvas = await html2canvas(area, { useCORS: true, scale: 2, backgroundColor: '#ffffff' });
                    const link = document.createElement("a");
                    link.href = canvas.toDataURL("image/png");
                    link.download = `Quiz_${new Date().getTime()}.png`; link.click();
                } catch (err) { showToast("이미지 저장 실패", true); }
                finally {
                    document.body.classList.remove('capturing');
                    document.querySelectorAll('.capture-input-wrapper').forEach(w => {
                        const r = w.querySelector('.real-input'), f = w.querySelector('.fake-input');
                        r.classList.remove('hidden'); 
                        f.classList.add('hidden');
                        f.classList.remove('flex', 'items-center');
                    });
                    captureBtn.textContent = '이미지로 저장하기';
                }
            };
        });
    </script>
</body>
</html>
