<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>충전기 대여 관리 대장</title>
    
    <!-- Google Fonts (귀여운 Jua 글꼴 적용) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (스타일링) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons (버튼 아이콘) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- xlsx-js-style (스타일이 지원되는 엑셀 다운로드 기능) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.min.js"></script>
    
    <!-- html2canvas (이미지 다운로드 기능) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="min-h-screen bg-gray-100 py-8 px-4 flex flex-col items-center" style="font-family: 'Jua', sans-serif;">
    
    <!-- 상단 버튼 영역 (인쇄 시 숨김) -->
    <div class="mb-6 flex gap-4 print:hidden">
        <button
            id="download-btn"
            class="flex items-center gap-2 px-5 py-2.5 rounded-lg text-white font-semibold shadow-md transition-colors bg-green-600 hover:bg-green-700"
            onclick="handleDownloadExcel()"
        >
            <i data-lucide="download" class="w-5 h-5"></i>
            엑셀 파일 다운로드
        </button>
        <button
            id="download-img-btn"
            class="flex items-center gap-2 px-5 py-2.5 rounded-lg text-white font-semibold shadow-md transition-colors bg-purple-600 hover:bg-purple-700"
            onclick="handleDownloadImage()"
        >
            <i data-lucide="image" class="w-5 h-5"></i>
            이미지 저장
        </button>
        <button
            class="flex items-center gap-2 px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-md transition-colors"
            onclick="window.print()"
        >
            <i data-lucide="printer" class="w-5 h-5"></i>
            문서 인쇄하기
        </button>
    </div>

    <!-- A4 용지 형태의 컨테이너 -->
    <div id="document-container" class="bg-white p-10 shadow-xl w-full max-w-[21cm] min-h-[29.7cm] flex flex-col print:shadow-none print:p-0">
        <table class="w-full border-collapse text-center text-sm" style="border: 1.5px solid #000">
            <thead>
                <!-- 제목 행 -->
                <tr>
                    <th 
                        colspan="6" 
                        class="py-10 border border-black text-[36px] tracking-widest text-white font-normal"
                        style="background-color: #2F855A;"
                    >
                        아동복지학과 &nbsp;&nbsp;충전기 &nbsp;&nbsp;대여 &nbsp;&nbsp;관리 &nbsp;&nbsp;대장
                    </th>
                </tr>
                <!-- 열 헤더 -->
                <tr class="bg-white text-base">
                    <th class="border border-black py-2.5 w-[8%] font-normal">순번</th>
                    <th class="border border-black py-2.5 w-[16%] font-normal">대여일</th>
                    <th class="border border-black py-2.5 w-[20%] font-normal">학번</th>
                    <th class="border border-black py-2.5 w-[16%] font-normal">이름</th>
                    <th class="border border-black py-2.5 w-[10%] font-normal">개수</th>
                    <th class="border border-black py-2.5 w-[30%] font-normal">반납 후 서명</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- JavaScript를 통해 자동으로 30행이 생성됩니다 -->
            </tbody>
        </table>
    </div>

    <script>
        // 1. 아이콘 초기화 렌더링
        lucide.createIcons();

        // 2. 1번부터 30번까지 테이블 빈 행 동적 렌더링
        const tbody = document.getElementById('table-body');
        for (let i = 1; i <= 30; i++) {
            const tr = document.createElement('tr');
            tr.className = "h-[26px]"; // 행 높이 지정
            tr.innerHTML = `
                <td class="border border-black font-medium">${i}</td>
                <td class="border border-black"></td>
                <td class="border border-black"></td>
                <td class="border border-black"></td>
                <td class="border border-black"></td>
                <td class="border border-black"></td>
            `;
            tbody.appendChild(tr);
        }

        // 3. 엑셀 다운로드 핸들러 함수
        function handleDownloadExcel() {
            // 라이브러리 로딩 체크
            if (typeof XLSX === 'undefined') {
                alert("엑셀 변환 기능을 불러오는 중입니다. 잠시 후 다시 시도해주세요.");
                return;
            }

            const wb = XLSX.utils.book_new();
            
            // 엑셀 데이터 구성
            const wsData = [
                ["아동복지학과 충전기 대여 관리 대장", "", "", "", "", ""],
                ["순번", "대여일", "학번", "이름", "개수", "반납 후 서명"]
            ];

            // 엑셀 파일에도 1번부터 30번까지 빈 행 생성
            for (let i = 1; i <= 30; i++) {
                wsData.push([i, "", "", "", "", ""]);
            }

            const ws = XLSX.utils.aoa_to_sheet(wsData);

            // 첫 번째 행 셀 병합 (제목 부분)
            ws["!merges"] = [
                { s: { r: 0, c: 0 }, e: { r: 0, c: 5 } }
            ];

            // 열 너비 설정
            ws["!cols"] = [
                { wch: 6 },  // 순번
                { wch: 14 }, // 대여일
                { wch: 18 }, // 학번
                { wch: 14 }, // 이름
                { wch: 8 },  // 개수
                { wch: 20 }  // 반납 후 서명
            ];

            // 행 높이 설정
            ws["!rows"] = [
                { hpx: 80 }, // 제목 행 높이 늘림
                { hpx: 30 }  // 헤더 행 높이
            ];
            for (let i = 2; i <= 31; i++) {
                ws["!rows"].push({ hpx: 25 }); // 데이터 행 높이
            }

            // 스타일 적용 (xlsx-js-style 전용)
            const range = XLSX.utils.decode_range(ws['!ref']);
            for (let R = range.s.r; R <= range.e.r; ++R) {
                for (let C = range.s.c; C <= range.e.c; ++C) {
                    const cellAddress = XLSX.utils.encode_cell({ r: R, c: C });
                    if (!ws[cellAddress]) ws[cellAddress] = { t: 's', v: '' }; // 빈 셀 생성
                    
                    // 기본 스타일 (테두리 및 가운데 정렬)
                    ws[cellAddress].s = {
                        border: {
                            top: { style: "thin", color: { auto: 1 } },
                            bottom: { style: "thin", color: { auto: 1 } },
                            left: { style: "thin", color: { auto: 1 } },
                            right: { style: "thin", color: { auto: 1 } }
                        },
                        alignment: { horizontal: "center", vertical: "center" }
                    };

                    // 제목 행 (0번째 행) 스타일 (배경색, 폰트색)
                    if (R === 0) {
                        ws[cellAddress].s.fill = { fgColor: { rgb: "FF2F855A" } }; // 초록색 배경
                        ws[cellAddress].s.font = { color: { rgb: "FFFFFFFF" }, sz: 24, bold: true }; // 글자 크기 증가
                    }
                    // 헤더 행 (1번째 행) 스타일
                    else if (R === 1) {
                        ws[cellAddress].s.fill = { fgColor: { rgb: "FFF2F2F2" } }; // 연한 회색 배경
                        ws[cellAddress].s.font = { sz: 11, bold: true };
                    }
                }
            }

            // 파일 생성 및 다운로드 실행
            XLSX.utils.book_append_sheet(wb, ws, "대여대장");
            XLSX.writeFile(wb, "아동복지학과_충전기대여관리대장.xlsx");
        }

        // 4. 이미지 다운로드 핸들러 함수
        function handleDownloadImage() {
            // 라이브러리 로딩 체크
            if (typeof html2canvas === 'undefined') {
                alert("이미지 변환 기능을 불러오는 중입니다. 잠시 후 다시 시도해주세요.");
                return;
            }

            const container = document.getElementById('document-container');
            
            // 고화질로 캡처하기 위해 scale을 2로 설정
            html2canvas(container, { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = '아동복지학과_충전기대여관리대장.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                console.error("이미지 저장 중 오류 발생:", err);
                alert("이미지 저장에 실패했습니다.");
            });
        }
    </script>
</body>
</html>
