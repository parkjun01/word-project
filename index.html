<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>충전기 대여 관리 대장</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- ExcelJS & FileSaver (엑셀에 색상, 정렬 등 서식을 적용하기 위해 라이브러리 교체) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="min-h-screen bg-gray-100 py-8 px-4 flex flex-col items-center" style="font-family: 'Jua', sans-serif;">
    
    <div class="mb-6 flex gap-3 print:hidden">
        <button
            class="flex items-center gap-2 px-4 py-2 rounded-lg text-white font-semibold shadow-md transition-colors bg-green-600 hover:bg-green-700"
            onclick="handleDownloadExcel()"
        >
            <i data-lucide="download" class="w-5 h-5"></i>
            엑셀 다운로드
        </button>
        <button
            class="flex items-center gap-2 px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-lg shadow-md transition-colors"
            onclick="handleDownloadImage()"
        >
            <i data-lucide="image" class="w-5 h-5"></i>
            이미지 저장
        </button>
        <button
            class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-md transition-colors"
            onclick="window.print()"
        >
            <i data-lucide="printer" class="w-5 h-5"></i>
            문서 인쇄
        </button>
        <button
            class="flex items-center gap-2 px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg shadow-md transition-colors"
            onclick="handleDownloadPDF()"
        >
            <i data-lucide="file-down" class="w-5 h-5"></i>
            PDF 저장
        </button>
    </div>

    <div id="document-container" class="bg-white p-10 shadow-xl w-full max-w-[21cm] min-h-[29.7cm] flex flex-col print:shadow-none print:p-0">
        <table class="w-full border-collapse text-center text-sm table-fixed" style="border: 1.5px solid #000">
            <thead>
                <tr>
                    <th 
                        colspan="6" 
                        class="h-[110px] border border-black text-[30px] tracking-widest text-white font-normal align-middle leading-none"
                        style="background-color: #2F855A;"
                    >
                        아동복지학과 충전기 대여 관리 대장
                    </th>
                </tr>
                <tr class="bg-white text-base">
                    <th class="border border-black h-[40px] w-[6%] font-normal align-middle text-center leading-none">순번</th>
                    <th class="border border-black h-[40px] w-[14%] font-normal align-middle text-center leading-none">대여일</th>
                    <th class="border border-black h-[40px] w-[18%] font-normal align-middle text-center leading-none">학번</th>
                    <th class="border border-black h-[40px] w-[14%] font-normal align-middle text-center leading-none">이름</th>
                    <th class="border border-black h-[40px] w-[6%] font-normal align-middle text-center leading-none">개수</th>
                    <th class="border border-black h-[40px] w-[42%] font-normal align-middle text-center leading-none">반납 후 서명</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- JavaScript를 통해 자동으로 30행이 생성됩니다 -->
            </tbody>
        </table>
    </div>

    <script>
        // 1. 아이콘 초기화
        lucide.createIcons();

        // 2. 1번부터 30번까지 테이블 빈 행 동적 렌더링
        const tbody = document.getElementById('table-body');
        for (let i = 1; i <= 30; i++) {
            const tr = document.createElement('tr');
            tr.className = "h-[30px]"; 
            tr.innerHTML = `
                <td class="border border-black font-medium align-middle text-center leading-none">${i}</td>
                <td class="border border-black align-middle text-center leading-none"></td>
                <td class="border border-black align-middle text-center leading-none"></td>
                <td class="border border-black align-middle text-center leading-none"></td>
                <td class="border border-black align-middle text-center leading-none"></td>
                <td class="border border-black align-middle text-center leading-none"></td>
            `;
            tbody.appendChild(tr);
        }

        // 3. 엑셀 다운로드 핸들러 (ExcelJS 적용하여 서식 유지)
        async function handleDownloadExcel() {
            if (typeof ExcelJS === 'undefined' || typeof saveAs === 'undefined') {
                alert("엑셀 변환 기능을 불러오는 중입니다. 잠시 후 다시 시도해주세요.");
                return;
            }

            const workbook = new ExcelJS.Workbook();
            const worksheet = workbook.addWorksheet('대여대장');

            // 1. 열 너비 설정
            worksheet.columns = [
                { width: 8 },   // 순번
                { width: 14 },  // 대여일
                { width: 18 },  // 학번
                { width: 14 },  // 이름
                { width: 8 },   // 개수
                { width: 40 }   // 반납 후 서명 (넓게)
            ];

            // 모든 셀의 공통 테두리 스타일
            const borderStyle = {
                top: { style: 'thin' },
                left: { style: 'thin' },
                bottom: { style: 'thin' },
                right: { style: 'thin' }
            };

            // 2. 제목 행 추가 및 서식 지정 (초록 배경, 흰색 글자)
            const titleRow = worksheet.addRow(['아동복지학과 충전기 대여 관리 대장']);
            worksheet.mergeCells('A1:F1');
            titleRow.height = 60; // 제목 칸 높이

            const titleCell = worksheet.getCell('A1');
            titleCell.fill = {
                type: 'pattern',
                pattern: 'solid',
                fgColor: { argb: 'FF2F855A' } // Tailwind bg-green-800 (#2F855A) 색상
            };
            titleCell.font = {
                name: 'Jua', // PC에 Jua 폰트가 없으면 맑은고딕 등으로 대체됨
                family: 4,
                size: 22,
                color: { argb: 'FFFFFFFF' }, // 흰색 텍스트
            };
            titleCell.alignment = { vertical: 'middle', horizontal: 'center' };
            titleCell.border = borderStyle;

            // 3. 헤더 행 추가
            const headerRow = worksheet.addRow(['순번', '대여일', '학번', '이름', '개수', '반납 후 서명']);
            headerRow.height = 30;
            headerRow.eachCell((cell) => {
                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFFFFF' } };
                cell.font = { name: 'Jua', size: 12 };
                cell.alignment = { vertical: 'middle', horizontal: 'center' };
                cell.border = borderStyle;
            });

            // 4. 데이터(빈칸) 30줄 생성
            for (let i = 1; i <= 30; i++) {
                const row = worksheet.addRow([i, '', '', '', '', '']);
                row.height = 25;
                row.eachCell((cell) => {
                    cell.font = { name: 'Jua', size: 11 };
                    cell.alignment = { vertical: 'middle', horizontal: 'center' };
                    cell.border = borderStyle;
                });
            }

            // 5. 엑셀 파일 생성 및 다운로드 (FileSaver.js 사용)
            const buffer = await workbook.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), '아동복지학과_충전기대여관리대장.xlsx');
        }

        // 4. 이미지 다운로드 핸들러 (async 추가)
        async function handleDownloadImage() {
            if (typeof html2canvas === 'undefined') {
                alert("이미지 변환 기능을 불러오는 중입니다. 잠시 후 다시 시도해주세요.");
                return;
            }
            
            const container = document.getElementById('document-container');
            
            // 캡처 전 스크롤 위치 초기화 및 폰트 로드 완료 대기 (글자 쏠림 방지 핵심)
            window.scrollTo(0, 0);
            await document.fonts.ready;
            
            // 캡처 시 그림자를 일시적으로 제거하여 깔끔한 테두리로 저장
            container.classList.remove('shadow-xl');
            
            // useCORS: true 옵션을 추가하여 귀여운 폰트(Google Font)가 그대로 캡처되도록 설정
            html2canvas(container, { scale: 2, useCORS: true, backgroundColor: '#ffffff' }).then(canvas => {
                container.classList.add('shadow-xl'); // 캡처 후 그림자 복구
                const link = document.createElement('a');
                link.download = '아동복지학과_충전기대여관리대장.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                container.classList.add('shadow-xl');
                console.error("이미지 저장 중 오류 발생:", err);
                alert("이미지 저장 중 오류가 발생했습니다.");
            });
        }

        // 5. PDF 다운로드 핸들러
        async function handleDownloadPDF() {
            if (typeof html2canvas === 'undefined' || typeof window.jspdf === 'undefined') {
                alert("PDF 변환 기능을 불러오는 중입니다. 잠시 후 다시 시도해주세요.");
                return;
            }
            
            const container = document.getElementById('document-container');
            const { jsPDF } = window.jspdf;
            
            try {
                // 캡처 전 스크롤 위치 초기화 및 폰트 로드 완료 대기 (글자 쏠림 방지 핵심)
                window.scrollTo(0, 0);
                await document.fonts.ready;

                // 캡처 시 그림자 제거 및 폰트 로드를 위한 CORS 설정
                container.classList.remove('shadow-xl');
                const canvas = await html2canvas(container, { 
                    scale: 2, 
                    useCORS: true, 
                    backgroundColor: '#ffffff' 
                });
                container.classList.add('shadow-xl'); // 캡처 후 그림자 복구
                
                const imgData = canvas.toDataURL('image/png');
                
                // A4 용지(210x297mm) 비율로 PDF 생성
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = pdf.internal.pageSize.getHeight();
                
                // 캔버스 비율에 맞춰 이미지 크기 계산
                const imgWidth = pdfWidth;
                const imgHeight = (canvas.height * pdfWidth) / canvas.width;
                
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
                pdf.save('아동복지학과_충전기대여관리대장.pdf');
            } catch (err) {
                container.classList.add('shadow-xl');
                console.error("PDF 저장 중 오류 발생:", err);
                alert("PDF 저장 중 오류가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
