<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우산 대여 관리 대장</title>
    
    <!-- Tailwind CSS (스타일링) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons (버튼 아이콘) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- SheetJS (엑셀 다운로드 기능) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="min-h-screen bg-gray-100 py-8 px-4 flex flex-col items-center font-sans">
    
    <!-- 상단 버튼 영역 (인쇄 시 숨김) -->
    <div class="mb-6 flex gap-4 print:hidden">
        <button
            id="download-btn"
            class="flex items-center gap-2 px-5 py-2.5 rounded-lg text-white font-semibold shadow-md transition-colors bg-green-600 hover:bg-green-700"
            onclick="handleDownloadExcel()"
        >
            <i data-lucide="download" class="w-5 h-5"></i>
            엑셀 파일 다운로드
        </button>
        <button
            class="flex items-center gap-2 px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-md transition-colors"
            onclick="window.print()"
        >
            <i data-lucide="printer" class="w-5 h-5"></i>
            문서 인쇄하기
        </button>
    </div>

    <!-- A4 용지 형태의 컨테이너 -->
    <div class="bg-white p-10 shadow-xl w-full max-w-[21cm] min-h-[29.7cm] flex flex-col print:shadow-none print:p-0">
        <table class="w-full border-collapse text-center text-sm" style="border: 1.5px solid #000">
            <thead>
                <!-- 제목 행 -->
                <tr>
                    <th 
                        colspan="7" 
                        class="py-6 border border-black text-[22px] font-bold tracking-widest"
                        style="background-color: #A5D8C6;"
                    >
                        아동복지학과 &nbsp;&nbsp;우산 &nbsp;&nbsp;대여 &nbsp;&nbsp;관리 &nbsp;&nbsp;대장
                    </th>
                </tr>
                <!-- 열 헤더 -->
                <tr class="bg-white">
                    <th class="border border-black py-2.5 w-[6%] font-semibold">순번</th>
                    <th class="border border-black py-2.5 w-[14%] font-semibold">대여일</th>
                    <th class="border border-black py-2.5 w-[18%] font-semibold">학번</th>
                    <th class="border border-black py-2.5 w-[15%] font-semibold">이름</th>
                    <th class="border border-black py-2.5 w-[7%] font-semibold">개수</th>
                    <th class="border border-black py-2.5 w-[16%] font-semibold">반납예정일</th>
                    <th class="border border-black py-1.5 w-[24%] font-semibold leading-tight">
                        실제반납일<br />
                        <span class="text-[11px] font-normal tracking-tighter">(반납시 작성)</span>
                    </th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- JavaScript를 통해 자동으로 30행이 생성됩니다 -->
            </tbody>
        </table>
    </div>

    <script>
        // 1. 아이콘 초기화 렌더링
        lucide.createIcons();

        // 2. 1번부터 30번까지 테이블 빈 행 동적 렌더링
        const tbody = document.getElementById('table-body');
        for (let i = 1; i <= 30; i++) {
            const tr = document.createElement('tr');
            tr.className = "h-[26px]"; // 행 높이 지정
            tr.innerHTML = `
                <td class="border border-black font-medium">${i}</td>
                <td class="border border-black"></td>
                <td class="border border-black"></td>
                <td class="border border-black"></td>
                <td class="border border-black"></td>
                <td class="border border-black"></td>
                <td class="border border-black"></td>
            `;
            tbody.appendChild(tr);
        }

        // 3. 엑셀 다운로드 핸들러 함수
        function handleDownloadExcel() {
            // 라이브러리 로딩 체크
            if (typeof XLSX === 'undefined') {
                alert("엑셀 변환 기능을 불러오는 중입니다. 잠시 후 다시 시도해주세요.");
                return;
            }

            const wb = XLSX.utils.book_new();
            
            // 엑셀 데이터 구성
            const wsData = [
                ["아동복지학과 우산 대여 관리 대장", "", "", "", "", "", ""],
                ["순번", "대여일", "학번", "이름", "개수", "반납예정일", "실제반납일\n(반납시 작성)"]
            ];

            // 엑셀 파일에도 1번부터 30번까지 빈 행 생성
            for (let i = 1; i <= 30; i++) {
                wsData.push([i, "", "", "", "", "", ""]);
            }

            const ws = XLSX.utils.aoa_to_sheet(wsData);

            // 첫 번째 행 셀 병합 (제목 부분)
            ws["!merges"] = [
                { s: { r: 0, c: 0 }, e: { r: 0, c: 6 } }
            ];

            // 열 너비 설정
            ws["!cols"] = [
                { wch: 6 },  // 순번
                { wch: 14 }, // 대여일
                { wch: 18 }, // 학번
                { wch: 14 }, // 이름
                { wch: 8 },  // 개수
                { wch: 16 }, // 반납예정일
                { wch: 22 }  // 실제반납일
            ];

            // 파일 생성 및 다운로드 실행
            XLSX.utils.book_append_sheet(wb, ws, "대여대장");
            XLSX.writeFile(wb, "아동복지학과_우산대여관리대장.xlsx");
        }
    </script>
</body>
</html>
